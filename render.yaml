services:
  - type: web
    name: campusflow-backend
    root: backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://campusflow.vercel.app
      - key: N8N_WEBHOOK_URL
        value: https://muhammadnavas.app.n8n.cloud/webhook/reminder
      - key: PORT
        value: 10000
